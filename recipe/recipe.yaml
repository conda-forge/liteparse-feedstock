context:
  name: liteparse
  version: "2.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@llamaindex/liteparse/-/liteparse-${{ version }}.tgz
  sha256: 007847fabd7bc4b13fc2399260212ab0b0a9e1e5f33d3d01856164a76ea8b7b9

build:
  number: 0
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs

tests:
  - requirements:
      run:
        - nodejs
    script:
      - liteparse --help

about:
  summary: Open-source PDF parsing with spatial text extraction and OCR processing
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/run-llama/liteparse
  repository: https://github.com/run-llama/liteparse

extra:
  recipe-maintainers:
    - moritzwilksch
