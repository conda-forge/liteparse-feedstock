context:
  name: liteparse
  version: "1.4.5"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@llamaindex/liteparse/-/liteparse-${{ version }}.tgz
  sha256: 8bef0fc2e291d2d18bd6798e69e9d03e9a92895b5533bf28517c94ed1a813aa3

build:
  number: 0
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs

tests:
  - requirements:
      run:
        - nodejs
    script:
      - liteparse --help

about:
  summary: Open-source PDF parsing with spatial text extraction and OCR processing
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/run-llama/liteparse
  repository: https://github.com/run-llama/liteparse

extra:
  recipe-maintainers:
    - moritzwilksch
