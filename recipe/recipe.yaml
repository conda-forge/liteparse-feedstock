context:
  name: liteparse
  version: "1.5.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@llamaindex/liteparse/-/liteparse-${{ version }}.tgz
  sha256: f876106b00badc848bc7280c09b45ab2e57bb55be9cc9c79cef2c8cabfcd1570

build:
  number: 0
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs

tests:
  - requirements:
      run:
        - nodejs
    script:
      - liteparse --help

about:
  summary: Open-source PDF parsing with spatial text extraction and OCR processing
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/run-llama/liteparse
  repository: https://github.com/run-llama/liteparse

extra:
  recipe-maintainers:
    - moritzwilksch
