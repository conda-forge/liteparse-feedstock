context:
  name: liteparse
  version: "2.0.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@llamaindex/liteparse/-/liteparse-${{ version }}.tgz
  sha256: bd4a1c6c3363f3654483797600d9e6c7bd461de41f7492ebf0ad0b589a8a37bc

build:
  number: 0
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs

tests:
  - requirements:
      run:
        - nodejs
    script:
      - liteparse --help

about:
  summary: Open-source PDF parsing with spatial text extraction and OCR processing
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/run-llama/liteparse
  repository: https://github.com/run-llama/liteparse

extra:
  recipe-maintainers:
    - moritzwilksch
